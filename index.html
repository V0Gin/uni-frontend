<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="مُتربَد - تصفح وتحميل المواد الدراسية بسهولة" />
  <title>مُتربَد</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Ambient background blobs -->
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <!-- Header -->
  <header id="main-header">
    <div class="header-inner">
      <div class="logo-group">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
            <line x1="12" y1="6" x2="12" y2="13" />
            <line x1="9" y1="10" x2="15" y2="10" />
          </svg>
        </div>
        <h1>مُتربَد</h1>
      </div>
      <button id="upload-toggle-btn" class="btn-primary" onclick="toggleUploadPanel()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        رفع ملفات
      </button>
    </div>
  </header>

  <main id="main-content">
    <!-- Breadcrumb -->
    <nav id="breadcrumb-bar" aria-label="مسار التنقل">
      <div class="breadcrumb-inner">
        <ol id="breadcrumb-list">
          <li>
            <button class="breadcrumb-item active" onclick="navigateTo(null)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <polyline points="9 22 9 12 15 12 15 22" />
              </svg>
              الرئيسية
            </button>
          </li>
        </ol>
      </div>
    </nav>

    <!-- Folder Grid -->
    <section id="folder-section">
      <div id="folder-grid" class="folder-grid">
        <!-- Folders rendered by JS -->
      </div>
      <!-- Files Section -->
      <div id="files-section" class="files-section hidden">
        <div class="section-divider">
          <span class="section-divider-line"></span>
          <span class="section-divider-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
            </svg>
            الملفات
          </span>
          <span class="section-divider-line"></span>
        </div>
        <div id="files-grid" class="files-grid">
          <!-- Files rendered by JS -->
        </div>
      </div>
      <!-- Empty state -->
      <div id="empty-state" class="empty-state hidden">
        <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
        </svg>
        <p>لا توجد مجلدات هنا</p>
        <span>هذا المجلد فارغ حالياً</span>
      </div>
      <!-- Loading state -->
      <div id="loading-state" class="loading-state">
        <div class="spinner"></div>
        <p>جاري تحميل المجلدات...</p>
      </div>
      <!-- Error state -->
      <div id="error-state" class="error-state hidden">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="15" y1="9" x2="9" y2="15" />
          <line x1="9" y1="9" x2="15" y2="15" />
        </svg>
        <p>تعذّر تحميل المجلدات</p>
        <button class="btn-secondary" onclick="loadFolders()">إعادة المحاولة</button>
      </div>
    </section>
  </main>

  <!-- Upload Panel Overlay -->
  <div id="upload-overlay" class="upload-overlay" onclick="toggleUploadPanel()"></div>

  <!-- Upload Side Panel -->
  <aside id="upload-panel" class="upload-panel">
    <div class="panel-header">
      <h2>رفع ملفات جديدة</h2>
      <button class="panel-close" onclick="toggleUploadPanel()" aria-label="إغلاق">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
    <form id="upload-form" onsubmit="handleUpload(event)">
      <!-- Current path display -->
      <div class="form-info" id="upload-path-info">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
        </svg>
        <span>سيتم الرفع إلى: <strong id="upload-target-path">الرئيسية</strong></span>
      </div>

      <!-- Name -->
      <div class="form-group">
        <label for="upload-name">الاسم <span class="required">*</span></label>
        <input type="text" id="upload-name" name="name" required placeholder="أدخل اسمك" autocomplete="off" />
      </div>

      <!-- Description -->
      <div class="form-group">
        <label for="upload-description">الوصف <span class="optional">(اختياري)</span></label>
        <textarea id="upload-description" name="description" rows="3" placeholder="أضف وصفاً مختصراً..."></textarea>
      </div>

      <!-- File Drop Zone -->
      <div class="form-group">
        <label>الملفات <span class="required">*</span></label>
        <div id="drop-zone" class="drop-zone" onclick="document.getElementById('file-input').click()">
          <input type="file" id="file-input" name="files" multiple hidden onchange="handleFileSelect(event)" />
          <div class="drop-zone-content">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 16 12 12 8 16" />
              <line x1="12" y1="12" x2="12" y2="21" />
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
            </svg>
            <p>اسحب الملفات هنا أو <span class="link">تصفّح</span></p>
            <span class="drop-zone-hint">يمكنك اختيار عدة ملفات</span>
          </div>
        </div>
        <!-- Selected files list -->
        <ul id="file-list" class="file-list"></ul>
      </div>

      <!-- Submit -->
      <button type="submit" id="submit-btn" class="btn-primary btn-full">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 16 12 12 8 16" />
          <line x1="12" y1="12" x2="12" y2="21" />
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
        </svg>
        <span id="submit-btn-text">رفع الملفات</span>
        <div class="btn-spinner hidden" id="submit-spinner"></div>
      </button>
    </form>
  </aside>

  <!-- Footer -->
  <footer id="main-footer">
    <p>مُتربَد - منكم وإليكم</p>
  </footer>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="app.js"></script>
</body>

</html>
